                    </button>

            </header>
            <nav class="sidebar-nav">
                <ul class="sidebar-nav__list">

                    </li>
                    <li class="sidebar-nav__item">

                    </li>
                    <li class="sidebar-nav__item">
                        <a href="#" class="sidebar-nav__link">Контакты</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="sidebar__contacts">
            <div class="sidebar__actions">
                <button class="sidebar__action">
                    <img src="img/call.svg" alt="Позвонить" class="sidebar__icon">
                </button>
                <button class="sidebar__action">
                    <img src="img/chat.svg" alt="Написать" class="sidebar__icon">
                </button>
                <button class="sidebar__action">
                    <img src="img/profile.svg" alt="Профиль" class="sidebar__icon">
